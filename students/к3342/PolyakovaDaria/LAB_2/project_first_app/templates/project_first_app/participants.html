{% extends 'strap.html' %}

{% block title %}Participants{% endblock %}

{% block content %}
<h2>Participants List</h2>
<table class="table">
    <thead>
        <tr>
            <th>User</th>
            <th>Conference</th>
        </tr>
    </thead>
    <tbody>
        {% for participant in participants %}
        <tr>
            <td>{{ participant.user.username }}</td>
            <td>{{ participant.conference.title }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">No participants found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
